version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: gen-ai-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-genai}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - gen-ai-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gen-ai-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/${MONGO_DB:-genai}?authSource=admin
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production}
    ports:
      - "${APP_PORT:-4000}:4000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - gen-ai-network
    volumes:
      - ./src:/app/src:ro
      - ./package.json:/app/package.json:ro
      - ./server.js:/app/server.js:ro

volumes:
  mongodb_data:
    driver: local

networks:
  gen-ai-network:
    driver: bridge

